    <title>GesssAI-Prono</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #12161e;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            margin: 0;
        }
        body.dark {
            background: #12161e;
        }

        .app {
            max-width: 500px;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 6px 6px 0 6px;
            background: #0d1118;
        }
        body.dark .app {
            background: #0d1118;
        }

        /* ===== HEADER - DOPPIO IN ALTEZZA ===== */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            color: white;
            margin-bottom: 6px;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.05);
            min-height: 72px;
            gap: 6px;
            position: relative;
        }

        /* Riga superiore: data/ora a sinistra, badge e tab a destra */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .header-top .clock {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.5);
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .header-top .clock .date-label {
            opacity: 0.5;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-right .badge-count {
            background: #fc5c7d;
            color: white;
            border-radius: 40px;
            padding: 0 10px;
            font-size: 0.6rem;
            font-weight: 700;
            line-height: 20px;
        }
        .header-right .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 0.65rem;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .header-right .tab-btn.active {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        /* Riga centrale: TITOLO GRANDE */
        .header-center {
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: 1.5px;
            background: linear-gradient(to right, #f0c27f, #fc5c7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            line-height: 1.2;
        }
        .header-center .sub {
            font-size: 0.6rem;
            letter-spacing: 3px;
            opacity: 0.3;
            -webkit-text-fill-color: rgba(255,255,255,0.2);
            display: block;
            font-weight: 300;
            margin-top: -2px;
        }

        /* ===== CONTENUTO PRINCIPALE ===== */
        .main-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            border-radius: 14px;
            background: #0d1118;
            min-height: 0;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .swipe-container {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            touch-action: none;
        }
        .swipe-container.view-card {
            transform: translateX(0%);
        }
        .swipe-container.view-ai {
            transform: translateX(-50%);
        }

        .swipe-panel {
            width: 50%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 4px 40px 4px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
        }
        .swipe-panel::-webkit-scrollbar {
            width: 2px;
        }
        .swipe-panel::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .swipe-panel::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        /* ===== CARD ===== */
        .match-card-swipe {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 14px 14px 12px 14px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.15s;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            min-height: 82vh;
            min-height: 82dvh;
            justify-content: space-between;
        }
        .match-card-swipe:active {
            transform: scale(0.98);
        }
        .match-card-swipe.active-card {
            border-color: #fc5c7d;
            box-shadow: 0 0 30px rgba(252,92,125,0.08);
        }

        /* HEADER CARD */
        .card-header-swipe {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .card-header-swipe .championship {
            background: rgba(255,255,255,0.06);
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
        }

        /* SQUADRE */
        .match-row-swipe {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: 1.4rem;
            color: #ffffff;
            margin-bottom: 10px;
            flex-shrink: 0;
            padding: 0 2px;
        }
        .match-row-swipe .team {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 42%;
            font-size: 1.3rem;
        }
        .match-row-swipe .vs {
            color: rgba(255,255,255,0.15);
            font-weight: 300;
            font-size: 0.9rem;
        }

        /* STATO FORMA */
        .form-row-swipe {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 8px 12px;
            margin: 4px 0 10px;
            flex-shrink: 0;
        }
        .form-row-swipe .form-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .form-row-swipe .form-box .label {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 2px;
            font-weight: 600;
        }
        .form-row-swipe .form-string {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #ffffff;
        }
        .form-row-swipe .form-string .W { color: #3db86b; }
        .form-row-swipe .form-string .D { color: #e6b422; }
        .form-row-swipe .form-string .L { color: #e06060; }

        /* PERCENTUALI */
        .perc-row-swipe {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 4px 0 12px;
            flex-shrink: 0;
        }
        .perc-row-swipe .perc-box {
            border-radius: 40px;
            padding: 6px 10px;
            flex: 1;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #1a1a1a;
            border: 1px solid transparent;
        }
        .perc-row-swipe .perc-box small {
            font-weight: 500;
            font-size: 0.55rem;
            color: #1a1a1a;
            opacity: 0.8;
            display: block;
            margin-top: 1px;
        }

        /* 3 GIOCATE */
        .stats-row-swipe {
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 10px;
            flex: 1;
            justify-content: center;
            min-height: 120px;
        }
        .stats-row-swipe .stat-chip {
            border-radius: 30px;
            padding: 10px 14px;
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a1a;
            width: 100%;
            text-align: center;
            border: 1px solid transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 48px;
        }
        .stats-row-swipe .stat-chip .num {
            font-weight: 700;
            color: #1a1a1a;
            font-size: 1.1rem;
        }
        .stats-row-swipe .stat-chip .multigol-fasce {
            font-weight: 700;
            font-size: 1rem;
            color: #1a1a1a;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.1);
            padding: 0 10px;
            border-radius: 12px;
        }
        .stats-row-swipe .stat-chip.flag-red { background: #fde0e0; border-color: #e57373; }
        .stats-row-swipe .stat-chip.flag-neutral { background: #f0f2f5; border-color: #b0b8c4; }
        .stats-row-swipe .stat-chip.flag-green { background: #d4edda; border-color: #58b36b; }
        .stats-row-swipe .stat-chip.flag-gold { background: #ffd966; border-color: #e6b800; }
        .stats-row-swipe .stat-chip.flag-bomb { background: #ffb347; border-color: #e67300; animation: pulse-gold 1.2s ease-in-out infinite; }

        /* FOOTER CARD */
        .card-footer-swipe {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.25);
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 8px;
        }

        /* ===== FLAG CLASSI ===== */
        .flag-red { background: #fde0e0; border-color: #e57373; color: #1a1a1a; }
        .flag-red small { color: #1a1a1a; }
        .flag-neutral { background: #f0f2f5; border-color: #b0b8c4; color: #1a1a1a; }
        .flag-neutral small { color: #1a1a1a; }
        .flag-green { background: #d4edda; border-color: #58b36b; color: #1a1a1a; }
        .flag-green small { color: #1a1a1a; }
        .flag-gold {
            background: #ffd966;
            border-color: #e6b800;
            color: #1a1a1a;
            box-shadow: 0 0 0 1px #0d1118, 0 0 0 3px #ffd966;
        }
        .flag-gold small { color: #1a1a1a; }
        .flag-bomb {
            background: #ffb347;
            border-color: #e67300;
            color: #1a1a1a;
            animation: pulse-gold 1.2s ease-in-out infinite;
        }
        .flag-bomb small { color: #1a1a1a; }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 8px rgba(255, 179, 71, 0.3); }
            50% { box-shadow: 0 0 24px rgba(255, 179, 71, 0.6); }
            100% { box-shadow: 0 0 8px rgba(255, 179, 71, 0.3); }
        }

        /* ===== PANEL AI ===== */
        .ai-panel-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            height: 100%;
            padding-bottom: 4px;
        }
        .ai-panel-content .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .ai-panel-content .ai-header h2 {
            color: #ffffff;
            font-size: 1rem;
        }
        .ai-panel-content .ai-header .match-counter {
            color: rgba(255,255,255,0.3);
            font-size: 0.65rem;
        }

        .ai-panel-content .ai-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }
        .ai-panel-content .ai-box {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 8px;
        }
        .ai-panel-content .ai-box .ai-label {
            font-size: 0.5rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .ai-panel-content .ai-box .ai-value {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .ai-panel-content .ai-box .ai-weather {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ai-panel-content .ai-box .ai-weather .wi { font-size: 1.4rem; }
        .ai-panel-content .ai-box .ai-weather .temp { font-size: 1rem; font-weight: 700; color: #fff; }
        .ai-panel-content .ai-box .ai-weather .cond { color: rgba(255,255,255,0.4); font-size: 0.65rem; }
        .ai-panel-content .ai-box .ai-weather .details { color: rgba(255,255,255,0.2); font-size: 0.55rem; }

        .ai-panel-content .ai-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 3px;
        }
        .ai-panel-content .ai-stats-grid .ai-stat-item {
            border-radius: 8px;
            padding: 6px 4px;
            text-align: center;
        }
        .ai-panel-content .ai-stats-grid .ai-stat-item .stat-label {
            font-size: 0.45rem;
            color: rgba(0,0,0,0.5);
            text-transform: uppercase;
            font-weight: 600;
        }
        .ai-panel-content .ai-stats-grid .ai-stat-item .stat-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .ai-panel-content .ai-stats-grid .ai-stat-item .stat-sub {
            font-size: 0.45rem;
            font-weight: 700;
            color: #1a1a1a;
            background: rgba(0,0,0,0.08);
            padding: 0 6px;
            border-radius: 6px;
            display: inline-block;
        }

        .ai-analysis-box {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 10px;
            line-height: 1.5;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.04);
            white-space: pre-wrap;
            font-size: 0.75rem;
            flex: 1;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
        }
        .ai-analysis-box strong { color: #fc5c7d; }
        .ai-analysis-box::-webkit-scrollbar { width: 2px; }
        .ai-analysis-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .ai-analysis-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* ===== INDICATORI SWIPE ===== */
        .swipe-indicators {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 3px 0;
            flex-shrink: 0;
        }
        .swipe-indicators .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: 0.3s;
            cursor: pointer;
        }
        .swipe-indicators .dot.active {
            background: #fc5c7d;
            width: 14px;
            border-radius: 10px;
        }
        .swipe-indicators .dot-label {
            font-size: 0.45rem;
            color: rgba(255,255,255,0.15);
            margin: 0 2px;
        }

        .footer-note {
            text-align: center;
            font-size: 0.45rem;
            color: rgba(255,255,255,0.08);
            flex-shrink: 0;
            padding: 2px 0;
        }

        .empty-state {
            text-align: center;
            padding: 30px 12px;
            color: rgba(255,255,255,0.4);
        }
        .empty-state span { display: block; font-size: 2rem; margin-bottom: 6px; }

        /* ===== PAGINE ===== */
        .page { display: none; flex-direction: column; height: 100%; flex: 1; }
        .page.active { display: flex; }

        /* ===== IMPOSTAZIONI ===== */
        .settings-container {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 14px;
            width: 100%;
            flex: 1;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .settings-container h2 { color: #fff; font-size: 1rem; margin-bottom: 10px; }
        .setting-group {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .setting-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .setting-group label { display: block; font-weight: 600; color: #e8edf5; margin-bottom: 2px; font-size: 0.7rem; }
        .setting-group .description { font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-bottom: 4px; }
        .setting-group input[type="text"],
        .setting-group input[type="password"] {
            width: 100%;
            padding: 5px 10px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            background: rgba(255,255,255,0.05);
            color: #e8edf5;
        }
        .setting-group input:focus {
            outline: none;
            border-color: #fc5c7d;
        }
        .show-hide-btn {
            margin-top: 4px;
            background: rgba(255,255,255,0.06);
            border: none;
            padding: 2px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.55rem;
            color: rgba(255,255,255,0.6);
            font-family: inherit;
        }
        .theme-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 0;
        }
        .theme-switch .switch {
            position: relative;
            width: 36px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .theme-switch .switch .slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .theme-switch .switch.active .slider {
            left: 18px;
            background: #fc5c7d;
        }
        .theme-switch .switch-label { font-weight: 500; font-size: 0.75rem; color: #e8edf5; }
        .theme-switch .switch-icon { font-size: 0.8rem; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .app { padding: 4px 4px 0 4px; }
            header { padding: 10px 12px; min-height: 64px; border-radius: 12px; gap: 4px; }
            .header-center { font-size: 1.3rem; }
            .header-center .sub { font-size: 0.5rem; }
            .header-top .clock { font-size: 0.55rem; }
            .header-right .tab-btn { font-size: 0.55rem; padding: 3px 8px; }
            .header-right .badge-count { font-size: 0.5rem; line-height: 18px; padding: 0 8px; }

            .match-card-swipe { padding: 10px 10px 8px 10px; min-height: 78vh; min-height: 78dvh; border-radius: 12px; }
            .match-row-swipe { font-size: 1.1rem; margin-bottom: 6px; }
            .match-row-swipe .team { font-size: 1rem; max-width: 40%; }
            .form-row-swipe { padding: 5px 8px; gap: 8px; }
            .form-row-swipe .form-string { font-size: 0.95rem; }
            .perc-row-swipe .perc-box { font-size: 0.95rem; padding: 4px 6px; }
            .stats-row-swipe { gap: 4px; min-height: 90px; padding-top: 6px; }
            .stats-row-swipe .stat-chip { font-size: 0.8rem; padding: 6px 10px; min-height: 36px; gap: 6px; }
            .stats-row-swipe .stat-chip .num { font-size: 0.85rem; }
            .stats-row-swipe .stat-chip .multigol-fasce { font-size: 0.8rem; padding: 0 8px; }
            .card-footer-swipe { font-size: 0.5rem; padding-top: 6px; margin-top: 4px; }
            .swipe-panel { padding: 3px 3px 30px 3px; }
            .ai-panel-content .ai-header h2 { font-size: 0.85rem; }
            .ai-panel-content .ai-box { padding: 6px; }
            .ai-panel-content .ai-box .ai-value { font-size: 0.7rem; }

<body>
<div class="app">

                <span class="date-label">📅</span>
                <span id="currentDate">--/--/----</span>
                <span>•</span>
                <span id="currentTime">--:--</span>
            </div>
            <div class="header-right">
                <button class="tab-btn active" data-tab="partite">📋 <span class="badge-count" id="matchCountBadge">0</span></button>

    <!-- PAGINA PARTITE -->
    <div id="page-partite" class="page active">

    <!-- PAGINA IMPOSTAZIONI -->
    <div id="page-impostazioni" class="page">
        <div class="settings-container">
            <h2>⚙️ Impostazioni</h2>
            <div class="setting-group">
                <label>Tema</label>
                <div class="description">Seleziona il tema dell'applicazione</div>
                <div class="theme-switch">
                    <span class="switch-icon" id="settingsThemeIcon">🌙</span>
                    <div class="switch active" id="settingsThemeSwitch">
                        <div class="slider"></div>
                    </div>
                    <span class="switch-label" id="settingsThemeLabel">Scuro</span>
                </div>
            </div>
            <div class="setting-group">
                <label>🔑 GROQ AI Key</label>
                <div class="description">Chiave API per l'analisi AI delle partite</div>
                <input type="password" id="groqKey" value="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">
                <button class="show-hide-btn" onclick="toggleVisibility('groqKey')">👁️ Mostra/Nascondi</button>
            </div>
            <div class="setting-group">
                <label>🌤️ World Weather Online Key</label>
                <div class="description">Chiave API per il meteo in tempo reale</div>
                <input type="password" id="weatherKey" value="d8df501134ef44eab6515526262007">
                <button class="show-hide-btn" onclick="toggleVisibility('weatherKey')">👁️ Mostra/Nascondi</button>
            </div>
            <div style="font-size:0.6rem; color:rgba(255,255,255,0.2); text-align:center;">
                Le chiavi sono salvate nel browser
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ============================================================
        //  OROLOGIO
        // ============================================================
        function updateClock() {
            const now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }
        updateClock();
        setInterval(updateClock, 10000);

        // ============================================================
        //  TAB NAVIGATION
        // ============================================================
        const tabBtns = document.querySelectorAll('.tab-btn');
        const pages = {
            partite: document.getElementById('page-partite'),
            impostazioni: document.getElementById('page-impostazioni')
        };

        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.dataset.tab;
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                Object.keys(pages).forEach(key => {
                    pages[key].classList.toggle('active', key === tab);
                });
            });
        });

        // ============================================================
        //  TEMA
        // ============================================================
        let darkMode = true;
        const themeSwitch = document.getElementById('settingsThemeSwitch');
        const themeIcon = document.getElementById('settingsThemeIcon');
        const themeLabel = document.getElementById('settingsThemeLabel');

        function applyTheme() {
            document.body.classList.toggle('dark', darkMode);
            themeIcon.textContent = darkMode ? '🌙' : '☀️';
            themeLabel.textContent = darkMode ? 'Scuro' : 'Chiaro';
            themeSwitch.classList.toggle('active', darkMode);
        }

        themeSwitch.addEventListener('click', function() {
            darkMode = !darkMode;
            applyTheme();
        });
        applyTheme();

        // ============================================================
        //  UTILITY
        // ============================================================
        window.toggleVisibility = function(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        function getFlagClass(p) {
            if (p >= 90) return 'flag-bomb';
            if (p >= 66.67) return 'flag-green';
            if (p >= 33.34) return 'flag-neutral';
            return 'flag-red';
        }

        // ============================================================
        //  DATI PARTITE
        // ============================================================
        const allMatches = [
            {
                id: 1, campionato: "J1 League", giornata: 24,
                data: "20/07/2026", dataObj: new Date(2026, 6, 20), ora: "19:00",
                home: "F. Okayama", away: "Vissel Kobe",
                formHome: "WLDWD", formAway: "DWWLD",
                percHome: 67, percAway: 33,
                under45: 78, multigol: 62, multigolFasce: "0-2 - 1-3", over15: 84,
                homeStats: { xG: 1.8, goalsAvg: 1.4, shots: 12 },
                awayStats: { xG: 1.2, goalsAvg: 0.9, shots: 9 },
                venue: "JFE Sunny Country Stadium",
                weather: { temp: 24, condition: 'Parzialmente nuvoloso', wind: 12, humidity: 65, icon: '⛅' }
            },
            {
                id: 2, campionato: "J1 League", giornata: 24,
                data: "20/07/2026", dataObj: new Date(2026, 6, 20), ora: "19:00",
                home: "Yokohama F.M.", away: "Grampus",
                formHome: "LWDWL", formAway: "DLWDL",
                percHome: 55, percAway: 45,
                under45: 69, multigol: 55, multigolFasce: "1-3 - 2-5", over15: 71,
                homeStats: { xG: 1.6, goalsAvg: 1.8, shots: 14 },
                awayStats: { xG: 1.1, goalsAvg: 0.7, shots: 8 },
                venue: "Nissan Stadium",
                weather: { temp: 26, condition: 'Sereno', wind: 8, humidity: 55, icon: '☀️' }
            },
            {
                id: 3, campionato: "J1 League", giornata: 24,
                data: "20/07/2026", dataObj: new Date(2026, 6, 20), ora: "19:00",
                home: "Albirex Niigata", away: "Sanf. Hiroshima",
                formHome: "LDDWL", formAway: "WDWWL",
                percHome: 38, percAway: 62,
                under45: 81, multigol: 44, multigolFasce: "0-2 - 1-3", over15: 59,
                homeStats: { xG: 0.9, goalsAvg: 0.7, shots: 8 },
                awayStats: { xG: 1.5, goalsAvg: 1.7, shots: 13 },
                venue: "Denka Big Swan Stadium",
                weather: { temp: 22, condition: 'Pioggia leggera', wind: 18, humidity: 80, icon: '🌧️' }
            }
        ];

        // ============================================================
        //  STATO SWIPE
        // ============================================================
        let currentMatches = [];
        let currentIndex = 0;
        let currentView = 'card';

        const swipeContainer = document.getElementById('swipeContainer');
        const cardsContainer = document.getElementById('cardsSwipeContainer');
        const aiContainer = document.getElementById('aiContainer');
        const dots = document.querySelectorAll('.dot');
        const badge = document.getElementById('matchCountBadge');

        // ============================================================
        //  FUNZIONI
        // ============================================================
        function loadMatchesForDate(date) {
            const dateStr = date.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            currentMatches = allMatches.filter(m => m.data === dateStr);
            currentIndex = 0;
            renderCards();
            badge.textContent = currentMatches.length;
            switchView('card');
        }

        function renderCards() {
            if (!currentMatches.length) {
                cardsContainer.innerHTML = `<div class="empty-state"><span>📅</span>Nessuna partita</div>`;
                aiContainer.innerHTML = `<div class="empty-state"><span>🤖</span>Nessuna partita</div>`;
                return;
            }

            let html = '';
            currentMatches.forEach((m, idx) => {
                const fh = m.formHome.split('').map(c => `<span class="${c}">${c}</span>`).join('');
                const fa = m.formAway.split('').map(c => `<span class="${c}">${c}</span>`).join('');
                const hc = getFlagClass(m.percHome);
                const ac = getFlagClass(m.percAway);
                const uc = getFlagClass(m.under45);
                const mc = getFlagClass(m.multigol);
                const oc = getFlagClass(m.over15);
                const active = idx === currentIndex ? 'active-card' : '';

                html += `
                    <div class="match-card-swipe ${active}" data-index="${idx}" onclick="selectMatch(${idx})">
                        <div class="card-header-swipe">
                            <span>${m.campionato}</span>
                            <span class="championship">Giornata ${m.giornata}</span>
                        </div>
                        <div class="match-row-swipe">
                            <span class="team">${m.home}</span>
                            <span class="vs">VS</span>
                            <span class="team">${m.away}</span>
                        </div>
                        <div class="form-row-swipe">
                            <div class="form-box">
                                <span class="label">STATO FORMA</span>
                                <div class="form-string">${fh}</div>
                            </div>
                            <div class="form-box">
                                <span class="label">STATO FORMA</span>
                                <div class="form-string">${fa}</div>
                            </div>
                        </div>
                        <div class="perc-row-swipe">
                            <div class="perc-box ${hc}">${m.percHome}% <small>${m.home}</small></div>
                            <div class="perc-box ${ac}">${m.percAway}% <small>${m.away}</small></div>
                        </div>
                        <div class="stats-row-swipe">
                            <div class="stat-chip ${uc}">📊 12+under 4,5 <span class="num">${m.under45}%</span></div>
                            <div class="stat-chip ${mc}">🎯 Multigol <span class="num">${m.multigol}%</span> <span class="multigol-fasce">${m.multigolFasce}</span></div>
                            <div class="stat-chip ${oc}">⚽ Over 1,5 <span class="num">${m.over15}%</span></div>
                        </div>
                        <div class="card-footer-swipe">
                            <span>📅 ${m.data} • ${m.ora}</span>
                            <span>#${m.id}</span>
                        </div>
                    </div>
                `;
            });

            cardsContainer.innerHTML = html;
            renderAI(currentMatches[currentIndex] || currentMatches[0]);
        }

        function renderAI(match) {
            if (!match) {
                aiContainer.innerHTML = `<div class="empty-state"><span>🤖</span>Nessuna partita</div>`;
                return;
            }

            const w = match.weather || { temp: 24, condition: 'Parzialmente nuvoloso', wind: 12, humidity: 65, icon: '⛅' };
            const analysis = generateAnalysis(match);

            aiContainer.innerHTML = `
                <div class="ai-header">
                    <h2>🤖 Analisi AI</h2>
                    <span class="match-counter">${currentIndex+1}/${currentMatches.length}</span>
                </div>
                <div class="ai-grid-2">
                    <div class="ai-box">
                        <div class="ai-label">🏟️ Stadio</div>
                        <div class="ai-value">${match.venue}</div>
                        <div style="font-size:0.6rem;color:rgba(255,255,255,0.2);">${match.campionato} · G.${match.giornata}</div>
                    </div>
                    <div class="ai-box">
                        <div class="ai-label">🌤️ Meteo</div>
                        <div class="ai-weather">
                            <span class="wi">${w.icon}</span>
                            <div>
                                <div class="temp">${w.temp}°C</div>
                                <div class="cond">${w.condition}</div>
                                <div class="details">💨 ${w.wind} km/h · 💧 ${w.humidity}%</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="ai-grid-2">
                    <div class="ai-box">
                        <div class="ai-label">📊 ${match.home}</div>
                        <div class="ai-value">xG: <strong>${match.homeStats.xG}</strong></div>
                        <div style="color:rgba(255,255,255,0.4);font-size:0.7rem;">Media gol: ${match.homeStats.goalsAvg}</div>
                        <div style="color:rgba(255,255,255,0.4);font-size:0.7rem;">Tiri: ${match.homeStats.shots}</div>
                    </div>
                    <div class="ai-box">
                        <div class="ai-label">📊 ${match.away}</div>
                        <div class="ai-value">xG: <strong>${match.awayStats.xG}</strong></div>
                        <div style="color:rgba(255,255,255,0.4);font-size:0.7rem;">Media gol: ${match.awayStats.goalsAvg}</div>
                        <div style="color:rgba(255,255,255,0.4);font-size:0.7rem;">Tiri: ${match.awayStats.shots}</div>
                    </div>
                </div>
                <div class="ai-box" style="flex-shrink:0;">
                    <div class="ai-label">🎯 Pronostici</div>
                    <div class="ai-stats-grid">
                        <div class="ai-stat-item ${getFlagClass(match.under45)}" style="background:${getFlagClass(match.under45) === 'flag-red' ? '#fde0e0' : getFlagClass(match.under45) === 'flag-neutral' ? '#f0f2f5' : getFlagClass(match.under45) === 'flag-green' ? '#d4edda' : getFlagClass(match.under45) === 'flag-gold' ? '#ffd966' : '#ffb347'};">
                            <div class="stat-label" style="color:#1a1a1a;opacity:0.6;">12+under 4,5</div>
                            <div class="stat-value" style="color:#1a1a1a;">${match.under45}%</div>
                        </div>
                        <div class="ai-stat-item ${getFlagClass(match.multigol)}" style="background:${getFlagClass(match.multigol) === 'flag-red' ? '#fde0e0' : getFlagClass(match.multigol) === 'flag-neutral' ? '#f0f2f5' : getFlagClass(match.multigol) === 'flag-green' ? '#d4edda' : getFlagClass(match.multigol) === 'flag-gold' ? '#ffd966' : '#ffb347'};">
                            <div class="stat-label" style="color:#1a1a1a;opacity:0.6;">Multigol</div>
                            <div class="stat-value" style="color:#1a1a1a;">${match.multigol}%</div>
                            <div class="stat-sub" style="color:#1a1a1a;opacity:0.6;font-weight:700;">${match.multigolFasce}</div>
                        </div>
                        <div class="ai-stat-item ${getFlagClass(match.over15)}" style="background:${getFlagClass(match.over15) === 'flag-red' ? '#fde0e0' : getFlagClass(match.over15) === 'flag-neutral' ? '#f0f2f5' : getFlagClass(match.over15) === 'flag-green' ? '#d4edda' : getFlagClass(match.over15) === 'flag-gold' ? '#ffd966' : '#ffb347'};">
                            <div class="stat-label" style="color:#1a1a1a;opacity:0.6;">Over 1,5</div>
                            <div class="stat-value" style="color:#1a1a1a;">${match.over15}%</div>
                        </div>
                    </div>
                </div>
                <div class="ai-analysis-box">${analysis}</div>
            `;
        }

        function generateAnalysis(m) {
            let a = `🔍 **Analisi tattica**:\n\n`;
            a += `**${m.home}** (${m.percHome}%) - Ultime 5: ${m.formHome}\n`;
            a += `**${m.away}** (${m.percAway}%) - Ultime 5: ${m.formAway}\n\n`;
            a += `📊 **Punti di forza**:\n`;
            if (m.homeStats.xG > m.awayStats.xG) {
                a += `• ${m.home} ha xG più alto (${m.homeStats.xG} vs ${m.awayStats.xG})\n`;
            } else {
                a += `• ${m.away} ha xG più alto (${m.awayStats.xG} vs ${m.homeStats.xG})\n`;
            }
            if (m.percHome > 50) a += `• ${m.home} favorito del ${m.percHome - m.percAway}%\n`;
            else if (m.percAway > 50) a += `• ${m.away} favorito del ${m.percAway - m.percHome}%\n`;
            else a += `• Partita equilibrata\n`;
            a += `\n⚠️ **Punti deboli**:\n`;
            if (m.formHome.includes('L')) a += `• ${m.home} ha sconfitte recenti\n`;
            if (m.formAway.includes('L')) a += `• ${m.away} ha sconfitte recenti\n`;
            if (!m.formHome.includes('L') && !m.formAway.includes('L')) a += `• Entrambe in buona forma\n`;
            a += `\n📈 **Previsione**:\n`;
            a += `• Over 1,5: ${m.over15}% ${m.over15 > 70 ? '✅ Alta' : '⚠️ Bassa'}\n`;
            a += `• Multigol: ${m.multigol}% (fasce ${m.multigolFasce})\n`;
            a += `\n💡 **Consiglio**: ${m.percHome > m.percAway ? m.home : m.away} favorito. `;
            const best = Math.max(m.under45, m.multigol, m.over15);
            a += `Mercato: ${best === m.under45 ? '12+under 4,5' : best === m.multigol ? 'Multigol' : 'Over 1,5'} (${best}%)`;
            return a;
        }

        // ============================================================
        //  NAVIGAZIONE
        // ============================================================
        window.selectMatch = function(idx) {
            if (idx < 0 || idx >= currentMatches.length) return;
            currentIndex = idx;
            renderCards();
            const cards = cardsContainer.querySelectorAll('.match-card-swipe');
            if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
            renderAI(currentMatches[idx]);
        };

        window.switchView = function(view) {
            if (view === currentView) return;
            currentView = view;
            swipeContainer.classList.remove('view-card', 'view-ai');
            swipeContainer.classList.add(view === 'card' ? 'view-card' : 'view-ai');
            dots.forEach(d => d.classList.toggle('active', d.dataset.view === view));
        };

        // ============================================================
        //  SWIPE
        // ============================================================
        let ty = 0, tx = 0, dy = 0, dx = 0, swiping = false;
        const mc = document.getElementById('mainContent');

        mc.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            ty = t.clientY; tx = t.clientX; dy = 0; dx = 0; swiping = true;
        }, { passive: true });

        mc.addEventListener('touchmove', (e) => {
            if (!swiping) return;
            const t = e.touches[0];
            dy = t.clientY - ty;
            dx = t.clientX - tx;

            if (Math.abs(dx) > 20 && Math.abs(dx) > Math.abs(dy) * 1.2) {
                e.preventDefault();
                if (dx < -20 && currentView === 'card') switchView('ai');
                else if (dx > 20 && currentView === 'ai') switchView('card');
                swiping = false;
                return;
            }

            if (Math.abs(dy) > 50 && Math.abs(dy) > Math.abs(dx) * 1.2) {
                e.preventDefault();
                if (dy < -50 && currentIndex < currentMatches.length - 1) selectMatch(currentIndex + 1);
                else if (dy > 50 && currentIndex > 0) selectMatch(currentIndex - 1);
                swiping = false;
            }
        }, { passive: false });

        mc.addEventListener('touchend', () => { swiping = false; }, { passive: true });

        // Mouse drag
        let mdX = 0, mdY = 0, dragging = false;
        mc.addEventListener('mousedown', (e) => { mdX = e.clientX; mdY = e.clientY; dragging = true; });
        mc.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const dX = e.clientX - mdX, dY = e.clientY - mdY;
            if (Math.abs(dX) > 30 && Math.abs(dX) > Math.abs(dY) * 1.2) {
                if (dX < -30 && currentView === 'card') switchView('ai');
                else if (dX > 30 && currentView === 'ai') switchView('card');
                dragging = false;
            }
        });
        mc.addEventListener('mouseup', () => { dragging = false; });

        // ============================================================
        //  KEYBOARD
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' && currentIndex > 0) { e.preventDefault(); selectMatch(currentIndex - 1); }
            else if (e.key === 'ArrowDown' && currentIndex < currentMatches.length - 1) { e.preventDefault(); selectMatch(currentIndex + 1); }
            else if (e.key === 'ArrowRight' && currentView === 'card') { e.preventDefault(); switchView('ai'); }
            else if (e.key === 'ArrowLeft' && currentView === 'ai') { e.preventDefault(); switchView('card'); }
        });

        // ============================================================
        //  SALVA CHIAVI
        // ============================================================
        document.querySelectorAll('#groqKey, #weatherKey').forEach(inp => {
            inp.addEventListener('change', function() { localStorage.setItem(this.id, this.value); });
            const saved = localStorage.getItem(inp.id);
            if (saved) inp.value = saved;
        });
