<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Calcio Card - Statistiche Partite</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --badge-bg: #2d3a4f;
            --stat-bg: #2d3a4f;
            --footer-bg: #1e2a3a;
            --shadow: rgba(0,0,0,0.4);
            --form-bg: #1e293b;
            --diff-bg: #1e2a3a;
            --score-bg: #1e2a3a;
            --tab-active: #3b82f6;
            --tab-inactive: #334155;
            --home-btn: #f59e0b;
            --section-bg: #1a2744;
            --pronostico-bg: #1e3a5f;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --font-size-base: 16px;
        }
        body.light {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --badge-bg: #e9edf4;
            --stat-bg: #f1f5f9;
            --footer-bg: #f1f5f9;
            --shadow: rgba(0,0,0,0.08);
            --form-bg: #f1f5f9;
            --diff-bg: #f1f5f9;
            --score-bg: #f1f5f9;
            --tab-inactive: #cbd5e1;
            --home-btn: #d97706;
            --section-bg: #f1f5f9;
            --pronostico-bg: #dbeafe;
        }
        body {
            background: var(--bg);
            padding: 0 12px 80px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            color: var(--text-primary);
            touch-action: pan-y;
            font-size: var(--font-size-base);
        }

        /* Dimensioni font */
        .font-sm { --font-size-base: 13px; }
        .font-md { --font-size-base: 16px; }
        .font-lg { --font-size-base: 19px; }
        .font-xl { --font-size-base: 22px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px 12px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
            transition: background 0.3s;
        }
        .datetime {
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .datetime .date { font-weight: 600; color: var(--text-primary); }
        .datetime .time { background: var(--badge-bg); padding: 3px 12px; border-radius: 30px; font-size: 0.8rem; font-weight: 500; }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--badge-bg);
            border-radius: 30px;
            padding: 3px;
            flex-shrink: 0;
        }
        .tab-btn {
            padding: 6px 14px;
            border-radius: 30px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--tab-active);
            color: #fff;
        }
        .tab-btn:hover:not(.active) { background: var(--tab-inactive); color: var(--text-primary); }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0.5; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 4px;
            padding-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: 0 4px 16px var(--shadow);
            padding: 16px 14px 18px;
            border: 1px solid var(--card-border);
            transition: 0.2s;
            width: 100%;
            cursor: pointer;
            touch-action: pan-y;
        }
        .card:active { transform: scale(0.98); }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding-bottom: 6px;
            border-bottom: 1px dashed var(--card-border);
            margin-bottom: 10px;
        }
        .card-header .campionato {
            background: var(--badge-bg);
            padding: 0 12px 0 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
        }
        .card-header .giornata { color: var(--text-secondary); font-weight: 500; }

        .data-ora {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--badge-bg);
            padding: 5px 12px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .squadre {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 4px 0 8px;
            color: var(--text-primary);
        }
        .squadre .vs { color: var(--text-secondary); font-weight: 400; font-size: 0.9rem; }

        .forme {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 8px 0 4px;
        }
        .forma-badge {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            background: var(--form-bg);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2px;
            color: var(--text-primary);
            flex: 1;
            justify-content: center;
            min-height: 32px;
            align-items: center;
        }
        .forma-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.75rem;
            color: #000;
            background: #6b7280;
        }
        .forma-box.V { background: #22c55e; }
        .forma-box.P { background: #eab308; }
        .forma-box.S { background: #ef4444; }
        .forma-box.\- { background: #6b7280; color: #fff; }

        .forma-score {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 2px 0 6px;
        }
        .forma-score .score {
            background: var(--score-bg);
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            flex: 1;
            text-align: center;
        }
        .forma-score .score .num { color: var(--text-primary); font-weight: 700; }

        .diff-perc {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 0 6px;
            background: var(--diff-bg);
            border-radius: 30px;
            margin: 2px 0 6px;
            color: var(--text-secondary);
        }
        .diff-perc .diff-value { padding: 2px 12px; border-radius: 20px; font-weight: 700; }

        .stat-perc {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 30px;
            text-align: center;
            margin: 4px 0 8px;
            background: var(--stat-bg);
            color: var(--text-secondary);
        }
        .stat-perc .perc {
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 700;
        }
        .stat-perc .label { color: var(--text-secondary); font-weight: 500; margin-right: 4px; }

        .flag-red { background: #dc2626; color: #fff; }
        .flag-neutral { background: #6b7280; color: #fff; }
        .flag-green { background: #22c55e; color: #000; }
        .flag-gold { background: #facc15; color: #000; font-weight: 700; }
        .flag-bomb {
            background: #facc15;
            color: #000;
            font-weight: 700;
            animation: bombPulse 0.8s infinite alternate;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        @keyframes bombPulse {
            0% { transform: scale(1); box-shadow: 0 0 5px #facc15; }
            100% { transform: scale(1.05); box-shadow: 0 0 20px #facc15; }
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            padding: 4px 0;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-secondary);
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-row .stat-value { color: var(--text-primary); font-weight: 600; }

        .multigol-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            padding: 2px 0;
            color: var(--text-secondary);
        }
        .multigol-row .label { font-weight: 500; }
        .multigol-row .value {
            color: var(--text-primary);
            font-weight: 600;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .multigol-row .value .perc { padding: 0 6px; border-radius: 12px; }

        .stat-footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 6px;
            margin-top: 10px;
            background: var(--footer-bg);
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .stat-footer span { background: var(--badge-bg); padding: 2px 12px; border-radius: 40px; }

        .no-match {
            text-align: center;
            padding: 50px 16px;
            color: var(--text-secondary);
            font-size: 1rem;
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid var(--card-border);
        }

        /* ================================================================ */
        /* ANALISI AI - Stile professionale */
        /* ================================================================ */

        .ai-container {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 16px;
            border: 1px solid var(--card-border);
            margin-top: 4px;
        }

        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .ai-header .match-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .ai-header .match-league {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--badge-bg);
            padding: 4px 14px;
            border-radius: 30px;
        }

        .ai-weather {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--badge-bg);
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .ai-weather .temp {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .ai-weather .city {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .ai-weather .desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .ai-weather .weather-icon {
            font-size: 1.75rem;
        }

        .ai-section {
            background: var(--section-bg);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-left: 3px solid var(--tab-active);
        }
        .ai-section .section-title {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ai-section .section-content {
            color: var(--text-primary);
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .ai-pronostico {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .ai-pronostico .pron-box {
            background: var(--pronostico-bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--card-border);
        }
        .ai-pronostico .pron-box .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .ai-pronostico .pron-box .value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 4px;
        }
        .ai-pronostico .pron-box .sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .ai-tips {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .ai-tips .tip-box {
            background: var(--section-bg);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--card-border);
            text-align: center;
        }
        .ai-tips .tip-box .tip-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .ai-tips .tip-box .tip-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 4px;
        }

        .ai-loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .ai-loading .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--badge-bg);
            border-top-color: var(--tab-active);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .home-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--home-btn);
            color: #000;
            border: none;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .home-btn:hover { transform: scale(1.1); }
        .home-btn:active { transform: scale(0.9); }

        .swipe-indicator {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 6px 0 2px;
            opacity: 0.6;
        }

        /* ================================================================ */
        /* IMPOSTAZIONI - Slider dimensione caratteri */
        /* ================================================================ */

        .font-slider-container {
            margin: 12px 0 8px;
        }
        .font-slider-container .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .font-slider-container input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background: var(--badge-bg);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .font-slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--tab-active);
            cursor: pointer;
        }
        .font-slider-container input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--tab-active);
            cursor: pointer;
            border: none;
        }
        .font-slider-container .font-size-display {
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            padding: 4px 0;
        }
        .font-slider-container .font-size-example {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 4px 0 8px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 8px;
        }
        .font-slider-container .font-size-example span {
            color: var(--text-primary);
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .top-bar { flex-direction: column; align-items: stretch; gap: 8px; }
            .datetime { justify-content: space-between; }
            .tabs { justify-content: center; }
            .card { padding: 14px 12px; }
            .squadre { font-size: 1rem; }
            .forma-box { width: 22px; height: 22px; font-size: 0.65rem; }
            .diff-perc { font-size: 0.7rem; gap: 12px; }
            .stat-footer { font-size: 0.65rem; }
            .ai-pronostico { grid-template-columns: 1fr 1fr 1fr; }
            .ai-tips { grid-template-columns: 1fr; }
            .home-btn { width: 48px; height: 48px; font-size: 20px; bottom: 16px; right: 16px; }
            .ai-header .match-title { font-size: 1.05rem; }
            .ai-weather .temp { font-size: 1.4rem; }
        }
        @media (max-width: 380px) {
            .ai-pronostico { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="datetime">
        <span class="date" id="currentDate"></span>
        <span class="time" id="currentTime"></span>
    </div>
    <div class="tabs" id="tabContainer">
        <button class="tab-btn active" data-tab="palinsesto">📋 Palinsesto</button>
        <button class="tab-btn" data-tab="analisi">🧠 Analisi AI</button>
        <button class="tab-btn" data-tab="impostazioni">⚙️ Impostazioni</button>
    </div>
</div>

<div class="tab-content active" id="tab-palinsesto">
    <div class="swipe-indicator">⬅️ 👆 Scorri per navigare tra le partite 👇 ➡️</div>
    <div class="grid-cards" id="cardsContainer"></div>
</div>

<div class="tab-content" id="tab-analisi">
    <div id="aiContent">
        <div class="ai-loading">
            <div class="spinner"></div>
            <p>Seleziona una partita per l'analisi AI</p>
        </div>
    </div>
</div>

<div class="tab-content" id="tab-impostazioni">
    <div class="ai-container">
        <h3 style="font-size:1rem;margin-bottom:12px;color:var(--text-primary);">⚙️ Impostazioni</h3>

        <label style="display:block;font-size:0.8rem;font-weight:500;color:var(--text-secondary);margin:10px 0 4px;">Tema</label>
        <div style="display:flex;gap:12px;margin-bottom:16px;">
            <button id="themeDark" class="tab-btn active" style="flex:1;padding:10px;border-radius:12px;border:2px solid var(--card-border);background:var(--bg);color:var(--text-primary);font-weight:600;cursor:pointer;">🌙 Scuro</button>
            <button id="themeLight" class="tab-btn" style="flex:1;padding:10px;border-radius:12px;border:2px solid var(--card-border);background:var(--bg);color:var(--text-primary);font-weight:600;cursor:pointer;">☀️ Chiaro</button>
        </div>

        <label style="display:block;font-size:0.8rem;font-weight:500;color:var(--text-secondary);margin:10px 0 4px;">Dimensione caratteri</label>
        <div class="font-slider-container">
            <div class="slider-label">
                <span>🔤 Piccolo</span>
                <span>🔤 Grande</span>
            </div>
            <input type="range" id="fontSizeSlider" min="1" max="4" step="1" value="2">
            <div class="font-size-display" id="fontSizeDisplay">Medio (16px)</div>
            <div class="font-size-example">Esempio: <span>Testo di prova</span> — <span style="font-weight:400;color:var(--text-secondary);">Tutte le scritte si ridimensionano</span></div>
        </div>

        <label style="display:block;font-size:0.8rem;font-weight:500;color:var(--text-secondary);margin:10px 0 4px;">GROQ API Key</label>
        <input type="text" id="groqKey" placeholder="Inserisci API Key GROQ" style="width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--card-border);background:var(--bg);color:var(--text-primary);font-size:0.85rem;outline:none;margin-bottom:4px;">
        <div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:12px;">✅ API Key salvata localmente</div>

        <label style="display:block;font-size:0.8rem;font-weight:500;color:var(--text-secondary);margin:10px 0 4px;">World Weather Online API Key</label>
        <input type="text" id="weatherKey" placeholder="Inserisci API Key Weather" style="width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--card-border);background:var(--bg);color:var(--text-primary);font-size:0.85rem;outline:none;margin-bottom:4px;">
        <div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:16px;">✅ API Key salvata localmente</div>

        <button id="saveSettings" style="width:100%;padding:12px;border-radius:30px;border:none;background:#3b82f6;color:#fff;font-weight:600;font-size:0.95rem;cursor:pointer;">💾 Salva Impostazioni</button>
    </div>
</div>

<button class="home-btn" id="homeBtn" title="Torna all'inizio">🏠</button>

<script>
    // ================================================================
    // DATI REALI
    // ================================================================

    const matchesData = [

    function getTeamStats(campionato, squadra) {
        const found = standings.find(s => s.campionato === campionato && s.squadra === squadra);
        if (found) return found;
        return { pos: '-', punti: '-', forma: '', gf: 0, gs: 0 };
    }

    function calculateFormScore(forma) {
        if (!forma || forma === '') return 0;
        let total = 0;
        forma.split(' ').forEach(c => { if (c === 'W') total += 20; else if (c === 'D') total += 7.5; });
        return total;
    }

    function winPercentage(stats) {
        if (!stats || stats.punti === '-') return { value: 0, label: '0%', flag: 'flag-red' };
        const pts = parseInt(stats.punti) || 0;
        if (pts === 0) return { value: 0, label: '0%', flag: 'flag-red' };
        const gf = parseInt(stats.gf) || 0;
        const gs = parseInt(stats.gs) || 0;
        const diff = gf - gs;
        let base = Math.min(100, Math.round((pts * 4.2) + (diff * 1.5)));
        base = Math.min(100, Math.max(5, base));
        return { value: base, label: base + '%', flag: getFlag(base) };
    }

    function multiGoalValues(stats) {
        if (!stats) return { p02: 0, p13: 0, p25: 0 };
        const gf = parseInt(stats.gf) || 0;
        const gs = parseInt(stats.gs) || 0;
        const total = gf + gs;
        if (total === 0) return { p02: 0, p13: 0, p25: 0 };
        const media = total / 10;
        let p02 = 40, p13 = 35, p25 = 25;
        if (media < 1.5) { p02 = 70; p13 = 20; p25 = 10; }
        else if (media < 2.5) { p02 = 50; p13 = 35; p25 = 15; }
        else if (media < 3.5) { p02 = 30; p13 = 45; p25 = 25; }
        else if (media < 4.5) { p02 = 20; p13 = 40; p25 = 40; }
        else { p02 = 10; p13 = 30; p25 = 60; }
        return { p02, p13, p25 };
    }

    function under45Percent(homeStats, awayStats) {
        const hTotal = (parseInt(homeStats.gf) || 0) + (parseInt(homeStats.gs) || 0);
        const aTotal = (parseInt(awayStats.gf) || 0) + (parseInt(awayStats.gs) || 0);
        const total = hTotal + aTotal;
        if (total === 0) return { value: 0, label: '0%', flag: 'flag-red' };
        const media = total / 20;
        let value = 0;
        if (media < 1.5) value = 78;
        else if (media < 2.5) value = 62;
        else if (media < 3.5) value = 48;
        else if (media < 4.5) value = 35;
        else value = 22;
        return { value, label: value + '%', flag: getFlag(value) };
    }

    function over15Percent(homeStats, awayStats) {
        const hTotal = (parseInt(homeStats.gf) || 0) + (parseInt(homeStats.gs) || 0);
        const aTotal = (parseInt(awayStats.gf) || 0) + (parseInt(awayStats.gs) || 0);
        const total = hTotal + aTotal;
        if (total === 0) return { value: 0, label: '0%', flag: 'flag-red' };
        const media = total / 20;
        let value = 0;
        if (media < 1.5) value = 30;
        else if (media < 2.5) value = 55;
        else if (media < 3.5) value = 70;
        else if (media < 4.5) value = 82;
        else value = 92;
        return { value, label: value + '%', flag: getFlag(value) };
    }

    function getFlag(value) {
        if (value >= 90) return 'flag-bomb';
        if (value >= 66.67) return 'flag-gold';
        if (value >= 33.34) return 'flag-green';
        return 'flag-neutral';
    }

    function formaBoxes(forma) {
        if (!forma || forma === '') {
            return '<span class="forma-box">-</span><span class="forma-box">-</span><span class="forma-box">-</span><span class="forma-box">-</span><span class="forma-box">-</span>';
        }
        return forma.split(' ').map(c => {
            const letter = c === 'W' ? 'V' : c === 'D' ? 'P' : c === 'L' ? 'S' : '-';
            return `<span class="forma-box ${letter}">${letter}</span>`;
        }).join('');
    }

    function formatDate(dateStr) {
        const parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr;
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function generateStatisticalTips(match) {
        const homeStats = getTeamStats(match.campionato, match.casa);
        const awayStats = getTeamStats(match.campionato, match.ospite);

        const homePts = parseInt(homeStats.punti) || 0;
        const awayPts = parseInt(awayStats.punti) || 0;
        const homeGf = parseInt(homeStats.gf) || 0;
        const homeGs = parseInt(homeStats.gs) || 0;
        const awayGf = parseInt(awayStats.gf) || 0;
        const awayGs = parseInt(awayStats.gs) || 0;

        const homeDiff = homeGf - homeGs;
        const awayDiff = awayGf - awayGs;
        const totalGoals = homeGf + homeGs + awayGf + awayGs;

        const homeWinPerc = Math.min(100, Math.round((homePts * 4.2) + (homeDiff * 1.5)));
        const awayWinPerc = Math.min(100, Math.round((awayPts * 4.2) + (awayDiff * 1.5)));
        const drawPerc = Math.max(0, 100 - homeWinPerc - awayWinPerc);

        const homeWin = Math.min(100, Math.max(5, homeWinPerc));
        const awayWin = Math.min(100, Math.max(5, awayWinPerc));
        const draw = Math.min(100, Math.max(5, drawPerc));

        let pronostico = 'X';
        if (homeWin > awayWin && homeWin > draw) pronostico = '1';
        else if (awayWin > homeWin && awayWin > draw) pronostico = '2';

        const maxPerc = Math.max(homeWin, awayWin, draw);
        const sicurezza = Math.min(100, Math.round(maxPerc + 10));

        const over15 = Math.min(100, Math.round((totalGoals / 20) * 100 + 20));
        const under45 = Math.min(100, Math.round(100 - (totalGoals / 20) * 15));

        const homeMulti = multiGoalValues(homeStats);
        const awayMulti = multiGoalValues(awayStats);
        const multi13 = Math.round((homeMulti.p13 + awayMulti.p13) / 2);

        let tip1 = 'X';
        if (homeWin > 60) tip1 = '1';
        else if (awayWin > 60) tip1 = '2';
        else if (homeWin > 40 && awayWin > 40) tip1 = '12';
        else if (homeWin > 40) tip1 = '1X';
        else if (awayWin > 40) tip1 = 'X2';

        const tip2 = `${tip1} + Under 4.5`;

        return {
            pronostico,
            sicurezza,
            sicurezzaText: sicurezza > 60 ? `Si (${sicurezza}%)` : `No (${sicurezza}%)`,
            tip1,
            tip2,
            homeWin: Math.round(homeWin),
            awayWin: Math.round(awayWin),
            draw: Math.round(draw),
            over15,
            under45,
            multi13
        };
    }

    let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;

    document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        touchEndY = e.changedTouches[0].screenY;
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 30) {
            const tabs = ['palinsesto', 'analisi', 'impostazioni'];
            const currentIdx = tabs.indexOf(currentTab);
            if (diffX < 0 && currentIdx < tabs.length - 1) {
                switchTab(tabs[currentIdx + 1]);
                if (tabs[currentIdx + 1] === 'analisi' && matches.length > 0) {
                    renderAnalisiAI(currentMatchIndex);
                }
            } else if (diffX > 0 && currentIdx > 0) {
                switchTab(tabs[currentIdx - 1]);
            }
        } else if (currentTab === 'palinsesto' && Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 30) {
            if (diffY < 0 && currentMatchIndex < matches.length - 1) {
                currentMatchIndex++;
                scrollToCard(currentMatchIndex);
            } else if (diffY > 0 && currentMatchIndex > 0) {
                currentMatchIndex--;
                scrollToCard(currentMatchIndex);
            }
        }
    }, { passive: true });

    function scrollToCard(index) {
        const cards = document.querySelectorAll('.card[data-tab="palinsesto"]');
        if (cards[index]) {
            cards[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
            cards.forEach((c, i) => {
                c.style.borderColor = i === index ? '#3b82f6' : 'var(--card-border)';
                c.style.transform = i === index ? 'scale(1.02)' : 'scale(1)';
            });
            setTimeout(() => {
                cards.forEach(c => {
                    c.style.borderColor = 'var(--card-border)';
                    c.style.transform = 'scale(1)';
                });
            }, 1000);
        }
    }

    // ================================================================
    // CLOCK, TEMA, FONT SIZE
    // ================================================================

    function updateClock() {
        const now = new Date();
        document.getElementById('currentDate').textContent = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        document.getElementById('currentTime').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    let currentTheme = localStorage.getItem('theme') || 'dark';

    function applyTheme(theme) {
        document.body.classList.toggle('light', theme === 'light');
        currentTheme = theme;
        localStorage.setItem('theme', theme);
        document.getElementById('themeDark').className = theme === 'dark' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('themeLight').className = theme === 'light' ? 'tab-btn active' : 'tab-btn';
    }

    // ================================================================
    // FONT SIZE
    // ================================================================

    const fontClasses = ['font-sm', 'font-md', 'font-lg', 'font-xl'];
    const fontLabels = ['Piccolo (13px)', 'Medio (16px)', 'Grande (19px)', 'Extra Grande (22px)'];
    const fontValues = [13, 16, 19, 22];

    function applyFontSize(level) {
        // Rimuovi tutte le classi di font
        document.body.classList.remove(...fontClasses);
        // Aggiungi la classe corrispondente
        if (level >= 1 && level <= 4) {
            document.body.classList.add(fontClasses[level - 1]);
        }
        // Aggiorna il display
        document.getElementById('fontSizeDisplay').textContent = fontLabels[level - 1] || 'Medio (16px)';
        document.getElementById('fontSizeSlider').value = level;
        localStorage.setItem('fontSize', level);
    }

    // ================================================================
    // IMPOSTAZIONI
    // ================================================================

    document.getElementById('themeDark').addEventListener('click', () => applyTheme('dark'));
    document.getElementById('themeLight').addEventListener('click', () => applyTheme('light'));

    document.getElementById('fontSizeSlider').addEventListener('input', function() {
        const level = parseInt(this.value);
        applyFontSize(level);
    });

    document.getElementById('saveSettings').addEventListener('click', () => {
        const groq = document.getElementById('groqKey').value.trim();
        const weather = document.getElementById('weatherKey').value.trim();
        if (groq) localStorage.setItem('groqApiKey', groq);
        if (weather) localStorage.setItem('weatherApiKey', weather);
        alert('✅ Impostazioni salvate!');
    });

    document.getElementById('groqKey').value = localStorage.getItem('groqApiKey') || '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';
    document.getElementById('weatherKey').value = localStorage.getItem('weatherApiKey') || 'd8df501134ef44eab6515526262007';

    // ================================================================
    // TAB BUTTONS
    // ================================================================

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const tab = this.dataset.tab;
            switchTab(tab);
            if (tab === 'analisi' && matches.length > 0) {
                renderAnalisiAI(currentMatchIndex);
            }
        });
    });

    // ================================================================
    // HOME BUTTON
    // ================================================================

    document.getElementById('homeBtn').addEventListener('click', () => {
        currentMatchIndex = 0;
        switchTab('palinsesto');
        if (matches.length > 0) {
            setTimeout(() => scrollToCard(0), 300);
        }
    });

    // ================================================================
    // AVVIO
    // ================================================================

    // Carica font size salvato
    const savedFontSize = parseInt(localStorage.getItem('fontSize')) || 2;
    applyFontSize(savedFontSize);

    applyTheme(currentTheme);
    updateClock();
    renderCards();
    setInterval(updateClock, 1000);
    setInterval(renderCards, 60000);

    if (matches.length > 0 && currentTab === 'analisi') {
        renderAnalisiAI(0);
    }
</script>
</body>
</html>
