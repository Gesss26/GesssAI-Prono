<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Calcio Card - Statistiche Partite</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --badge-bg: #2d3a4f;
            --stat-bg: #2d3a4f;
            --footer-bg: #1e2a3a;
            --shadow: rgba(0,0,0,0.4);
            --form-bg: #1e293b;
            --diff-bg: #1e2a3a;
            --score-bg: #1e2a3a;
            --tab-active: #3b82f6;
            --tab-inactive: #334155;
            --home-btn: #f59e0b;
            --section-bg: #1a2744;
            --pronostico-bg: #1e3a5f;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --font-size-base: 16px;
            --select-bg: #1e293b;
            --select-border: #334155;
            --gold: #facc15;
            --gold-dark: #d4a800;
        }
        body.light {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --badge-bg: #e9edf4;
            --stat-bg: #f1f5f9;
            --footer-bg: #f1f5f9;
            --shadow: rgba(0,0,0,0.08);
            --form-bg: #f1f5f9;
            --diff-bg: #f1f5f9;
            --score-bg: #f1f5f9;
            --tab-inactive: #cbd5e1;
            --home-btn: #d97706;
            --section-bg: #f1f5f9;
            --pronostico-bg: #dbeafe;
            --select-bg: #ffffff;
            --select-border: #e2e8f0;
        }
        body {
            background: var(--bg);
            padding: 0 12px 80px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            color: var(--text-primary);
            touch-action: pan-y;
            font-size: var(--font-size-base);
        }

        .font-sm { --font-size-base: 16.25px; }
        .font-md { --font-size-base: 20px; }
        .font-lg { --font-size-base: 23.75px; }
        .font-xl { --font-size-base: 27.5px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px 12px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
            transition: background 0.3s;
        }
        .datetime {
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .datetime .date { font-weight: 600; color: var(--text-primary); }
        .datetime .time { background: var(--badge-bg); padding: 3px 12px; border-radius: 30px; font-size: 0.8rem; font-weight: 500; }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--badge-bg);
            border-radius: 30px;
            padding: 3px;
            flex-shrink: 0;
        }
        .tab-btn {
            padding: 6px 14px;
            border-radius: 30px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--tab-active);
            color: #fff;
        }
        .tab-btn:hover:not(.active) { background: var(--tab-inactive); color: var(--text-primary); }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0.5; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-bar select {
            background: var(--select-bg);
            color: var(--text-primary);
            border: 1px solid var(--select-border);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            min-width: 180px;
            flex: 1;
            max-width: 300px;
        }
        .filter-bar .count-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 4px;
            padding-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: 0 4px 16px var(--shadow);
            padding: 16px 14px 18px;
            border: 1px solid var(--card-border);
            transition: 0.2s;
            width: 100%;
            cursor: pointer;
            touch-action: pan-y;
        }
        .card:active { transform: scale(0.98); }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding-bottom: 6px;
            border-bottom: 1px dashed var(--card-border);
            margin-bottom: 10px;
        }
        .card-header .campionato {
            background: var(--badge-bg);
            padding: 0 12px 0 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
        }
        .card-header .giornata { color: var(--text-secondary); font-weight: 500; }

        .data-ora {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--badge-bg);
            padding: 5px 12px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .data-ora .today-badge { color: #22c55e; font-weight: 700; }
        .data-ora .tomorrow-badge { color: #eab308; font-weight: 700; }
        .data-ora .dayafter-badge { color: #60a5fa; font-weight: 700; }

        .squadre {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 4px 0 8px;
            color: var(--text-primary);
        }
        .squadre .vs { color: var(--text-secondary); font-weight: 400; font-size: 0.9rem; }

        .forme {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 8px 0 4px;
        }
        .forma-badge {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            background: var(--form-bg);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2px;
            color: var(--text-primary);
            flex: 1;
            justify-content: center;
            min-height: 32px;
            align-items: center;
        }
        .forma-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.75rem;
            color: #000;
            background: #6b7280;
        }
        .forma-box.V { background: #22c55e; }
        .forma-box.P { background: #eab308; }
        .forma-box.S { background: #ef4444; }
        .forma-box.\- { background: #6b7280; color: #fff; }

        .forma-score {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 2px 0 6px;
        }
        .forma-score .score {
            background: var(--score-bg);
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            flex: 1;
            text-align: center;
        }
        .forma-score .score .num { color: var(--text-primary); font-weight: 700; }

        .diff-perc {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 0 6px;
            background: var(--diff-bg);
            border-radius: 30px;
            margin: 2px 0 6px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        .diff-perc .diff-value {
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .diff-perc .diff-arrow {
            font-size: 1rem;
        }

        .stat-perc {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 30px;
            text-align: center;
            margin: 4px 0 8px;
            background: var(--stat-bg);
            color: var(--text-secondary);
        }
        .stat-perc .perc {
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .flag-red { background: #dc2626; color: #fff; }
        .flag-neutral { background: #6b7280; color: #fff; }
        .flag-green { background: #22c55e; color: #000; }
        .flag-gold { background: #facc15; color: #000; font-weight: 700; }
        .flag-bomb {
            background: #facc15;
            color: #000;
            font-weight: 700;
            animation: bombPulse 0.8s infinite alternate;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        @keyframes bombPulse {
            0% { transform: scale(1); box-shadow: 0 0 5px #facc15; }
            100% { transform: scale(1.05); box-shadow: 0 0 20px #facc15; }
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            padding: 4px 0;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-secondary);
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-row .stat-value { color: var(--text-primary); font-weight: 600; }

        .multigol-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            padding: 2px 0;
            color: var(--text-secondary);
        }
        .multigol-row .label { font-weight: 500; }
        .multigol-row .value {
            color: var(--text-primary);
            font-weight: 600;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .multigol-row .value .perc { padding: 0 6px; border-radius: 12px; }

        .stat-footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 6px;
            margin-top: 10px;
            background: var(--footer-bg);
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .stat-footer .footer-tag {
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .stat-footer .footer-tag.flag-red { background: #dc2626; color: #fff; }
        .stat-footer .footer-tag.flag-green { background: #22c55e; color: #000; }
        .stat-footer .footer-tag.flag-gold { background: #facc15; color: #000; }
        .stat-footer .footer-tag.flag-bomb {
            background: #facc15;
            color: #000;
            font-weight: 700;
            animation: bombPulse 0.8s infinite alternate;
        }
        .stat-footer .footer-tag.flag-neutral { background: #6b7280; color: #fff; }

        .no-match {
            text-align: center;
            padding: 50px 16px;
            color: var(--text-secondary);
            font-size: 1rem;
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid var(--card-border);
        }

        .ai-container {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 16px;
            border: 1px solid var(--card-border);
            margin-top: 4px;
        }

        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .ai-header .match-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .ai-header .match-league {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--badge-bg);
            padding: 4px 14px;
            border-radius: 30px;
        }

        .ai-rigenera {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }
        .ai-rigenera button {
            background: var(--tab-active);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ai-rigenera button:hover { transform: scale(1.02); opacity: 0.9; }
        .ai-rigenera button:active { transform: scale(0.95); }
        .ai-rigenera button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .ai-rigenera button .spinner-small {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .ai-weather {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--badge-bg);
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .ai-weather .temp {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .ai-weather .city {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .ai-weather .desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .ai-weather .weather-icon {
            font-size: 1.75rem;
        }

        .ai-section {
            background: var(--section-bg);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-left: 3px solid var(--tab-active);
        }
        .ai-section .section-title {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ai-section .section-content {
            color: var(--text-primary);
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .ai-section .section-content table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            margin-top: 4px;
        }
        .ai-section .section-content table th {
            text-align: left;
            color: var(--text-secondary);
            font-weight: 600;
            padding: 3px 5px;
            border-bottom: 1px solid var(--card-border);
        }
        .ai-section .section-content table td {
            padding: 3px 5px;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-primary);
        }
        .ai-section .section-content table tr.gold td {
            background: var(--gold);
            color: #000;
            font-weight: 700;
        }

        .ai-forma-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0;
            flex-wrap: wrap;
        }
        .ai-forma-row .team-name {
            font-weight: 600;
            color: var(--text-primary);
            min-width: 80px;
            font-size: 0.8rem;
        }
        .ai-forma-row .forma-box-small {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.65rem;
            color: #000;
            background: #6b7280;
        }
        .ai-forma-row .forma-box-small.V { background: #22c55e; }
        .ai-forma-row .forma-box-small.P { background: #eab308; }
        .ai-forma-row .forma-box-small.S { background: #ef4444; }
        .ai-forma-row .forma-box-small.\- { background: #6b7280; color: #fff; }

        .ai-pronostico {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .ai-pronostico .pron-box {
            background: var(--pronostico-bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--card-border);
        }
        .ai-pronostico .pron-box .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .ai-pronostico .pron-box .value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 4px;
        }
        .ai-pronostico .pron-box .sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .ai-tips {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .ai-tips .tip-box {
            background: var(--section-bg);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--card-border);
            text-align: center;
        }
        .ai-tips .tip-box .tip-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .ai-tips .tip-box .tip-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 4px;
        }

        .ai-loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .ai-loading .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--badge-bg);
            border-top-color: var(--tab-active);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        .home-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--home-btn);
            color: #000;
            border: none;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .home-btn:hover { transform: scale(1.1); }
        .home-btn:active { transform: scale(0.9); }

        .swipe-indicator {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 6px 0 2px;
            opacity: 0.6;
        }

        .font-slider-container {
            margin: 12px 0 8px;
        }
        .font-slider-container .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .font-slider-container input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background: var(--badge-bg);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .font-slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--tab-active);
            cursor: pointer;
        }
        .font-slider-container input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--tab-active);
            cursor: pointer;
            border: none;
        }
        .font-slider-container .font-size-display {
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            padding: 4px 0;
        }
        .font-slider-container .font-size-example {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 4px 0 8px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 8px;
        }
        .font-slider-container .font-size-example span {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Pulsante Simula Telefono */
        .simulate-btn {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #8b5cf6;
            color: #fff;
            border: none;
            font-size: 20px;
            cursor: pointer;
            z-index: 99;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .simulate-btn:hover { transform: scale(1.1); }
        .simulate-btn:active { transform: scale(0.9); }

        /* MODAL SIMULAZIONE TELEFONO */
        .phone-simulator-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);

            position: relative;
            overflow: hidden;
        }
        .phone-frame .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #000;
            border-radius: 0 0 16px 16px;
            z-index: 10;
        }
        .phone-frame .phone-content {
            width: 100%;
            height: 100%;
            border-radius: 28px;
            overflow-y: auto;
            overflow-x: hidden;
            background: var(--bg);
            padding: 10px 8px 20px;
            scroll-behavior: smooth;
        }
        .phone-frame .phone-content::-webkit-scrollbar {
            width: 3px;
        }
        .phone-frame .phone-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .phone-frame .phone-content::-webkit-scrollbar-thumb {
            background: var(--tab-active);
            border-radius: 10px;
        }
        .phone-close-btn {
            position: absolute;
            top: 30px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .phone-close-btn:hover {
            background: rgba(255,255,255,0.3);

    function getTeamStats(campionato, squadra) {
        const found = standings.find(s => s.campionato === campionato && s.squadra === squadra);
        if (found) return found;
        return { pos: '-', punti: '-', pg: '-', v: '-', p: '-', s: '-', gf: 0, gs: 0, diff: '-', xg: 0, forma: '' };
    }

    function formaBoxes(forma) {
        if (!forma || forma === '') {
            return '<span class="forma-box">-</span><span class="forma-box">-</span><span class="forma-box">-</span><span class="forma-box">-</span><span class="forma-box">-</span>';
        }
        return forma.split(' ').map(c => {
            const letter = c === 'W' ? 'V' : c === 'D' ? 'P' : c === 'L' ? 'S' : '-';
            return `<span class="forma-box ${letter}">${letter}</span>`;
        }).join('');
    }

    function formatDate(dateStr) {
        const parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr;
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function calculateFormScore(forma) {
        if (!forma || forma === '') return 0;
        let total = 0;
        forma.split(' ').forEach(c => { if (c === 'W') total += 20; else if (c === 'D') total += 7.5; });
        return total;
    }

    // ================================================================
    // CALCOLO PERCENTUALI 1X2 CORRETTO (somma = 100%)
    // ================================================================

    function getWinPercentages(homeStats, awayStats) {
        const homePts = parseInt(homeStats.punti) || 0;
        const awayPts = parseInt(awayStats.punti) || 0;
        const homeGf = parseInt(homeStats.gf) || 0;
        const homeGs = parseInt(homeStats.gs) || 0;
        const awayGf = parseInt(awayStats.gf) || 0;
        const awayGs = parseInt(awayStats.gs) || 0;
        
        const homeDiff = homeGf - homeGs;
        const awayDiff = awayGf - awayGs;
        
        // Rating: punti * 3 + differenza reti * 0.5
        const homeRating = (homePts * 3) + (homeDiff * 0.5);
        const awayRating = (awayPts * 3) + (awayDiff * 0.5);
        
        // Se entrambi i rating sono 0, usa valori predefiniti
        if (homeRating === 0 && awayRating === 0) {
            return { home: 33, draw: 34, away: 33 };
        }
        
        // Calcola le probabilità grezze (base 15% per squadra + 30% pareggio)
        const totalRating = homeRating + awayRating;
        let homeProb = (homeRating / totalRating) * 70 + 15;
        let awayProb = (awayRating / totalRating) * 70 + 15;
        let drawProb = 30;
        
        // Normalizza per avere somma 100
        const sum = homeProb + drawProb + awayProb;
        homeProb = Math.round((homeProb / sum) * 100);
        drawProb = Math.round((drawProb / sum) * 100);
        awayProb = Math.round((awayProb / sum) * 100);
        
        // Correggi arrotondamenti
        let diff = 100 - (homeProb + drawProb + awayProb);
        if (diff !== 0) {
            if (homeProb >= drawProb && homeProb >= awayProb) homeProb += diff;
            else if (drawProb >= homeProb && drawProb >= awayProb) drawProb += diff;
            else awayProb += diff;
        }
        
        return { home: homeProb, draw: drawProb, away: awayProb };
    }

    function getFlagForPercent(value) {
        if (value >= 75) return 'flag-bomb';
        if (value >= 60) return 'flag-gold';
        if (value >= 40) return 'flag-green';
        return 'flag-neutral';
    }

    // ================================================================
    // MULTIGOL E UNDER/OVER
    // ================================================================

    function multiGoalValues(stats) {
        if (!stats) return { p02: 0, p13: 0, p25: 0 };
        const gf = parseInt(stats.gf) || 0;
        const gs = parseInt(stats.gs) || 0;
        const total = gf + gs;
        if (total === 0) return { p02: 0, p13: 0, p25: 0 };
        const media = total / 10;
        let p02 = 40, p13 = 35, p25 = 25;
        if (media < 1.5) { p02 = 70; p13 = 20; p25 = 10; }
        else if (media < 2.5) { p02 = 50; p13 = 35; p25 = 15; }
        else if (media < 3.5) { p02 = 30; p13 = 45; p25 = 25; }
        else if (media < 4.5) { p02 = 20; p13 = 40; p25 = 40; }
        else { p02 = 10; p13 = 30; p25 = 60; }
        return { p02, p13, p25 };
    }

    function under45Percent(homeStats, awayStats) {
        const hTotal = (parseInt(homeStats.gf) || 0) + (parseInt(homeStats.gs) || 0);
        const aTotal = (parseInt(awayStats.gf) || 0) + (parseInt(awayStats.gs) || 0);
        const total = hTotal + aTotal;
        if (total === 0) return { value: 0, label: '0%', flag: 'flag-neutral' };
        const media = total / 20;
        let value = 0;
        if (media < 1.5) value = 78;
        else if (media < 2.5) value = 62;
        else if (media < 3.5) value = 48;
        else if (media < 4.5) value = 35;
        else value = 22;
        return { value, label: value + '%', flag: getFlagForPercent(value) };
    }

    function over15Percent(homeStats, awayStats) {
        const hTotal = (parseInt(homeStats.gf) || 0) + (parseInt(homeStats.gs) || 0);
        const aTotal = (parseInt(awayStats.gf) || 0) + (parseInt(awayStats.gs) || 0);
        const total = hTotal + aTotal;
        if (total === 0) return { value: 0, label: '0%', flag: 'flag-neutral' };
        const media = total / 20;
        let value = 0;
        if (media < 1.5) value = 30;
        else if (media < 2.5) value = 55;
        else if (media < 3.5) value = 70;
        else if (media < 4.5) value = 82;
        else value = 92;
        return { value, label: value + '%', flag: getFlagForPercent(value) };
    }

    function getTodayAndTomorrow() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        const dayAfter = new Date(today);
        dayAfter.setDate(dayAfter.getDate() + 2);

        const format = (d) => {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        return { oggi: format(today), domani: format(tomorrow), dopoDomani: format(dayAfter) };
    }

    function generateStatsForPrompt(match) {
        const homeStats = getTeamStats(match.campionato, match.casa);
        const awayStats = getTeamStats(match.campionato, match.ospite);

        const homeMediaFatti = homeStats.pg > 0 ? (homeStats.gf / homeStats.pg).toFixed(2) : 'N/D';
        const homeMediaSubiti = homeStats.pg > 0 ? (homeStats.gs / homeStats.pg).toFixed(2) : 'N/D';
        const homeMediaTotali = homeStats.pg > 0 ? ((homeStats.gf + homeStats.gs) / homeStats.pg).toFixed(2) : 'N/D';
        const awayMediaFatti = awayStats.pg > 0 ? (awayStats.gf / awayStats.pg).toFixed(2) : 'N/D';
        const awayMediaSubiti = awayStats.pg > 0 ? (awayStats.gs / awayStats.pg).toFixed(2) : 'N/D';
        const awayMediaTotali = awayStats.pg > 0 ? ((awayStats.gf + awayStats.gs) / awayStats.pg).toFixed(2) : 'N/D';

        const formaHome = homeStats.forma || '';
        const formaAway = awayStats.forma || '';
        const puntiHome = formaHome ? formaHome.split(' ').filter(c => c === 'W').length * 3 + formaHome.split(' ').filter(c => c === 'D').length * 1 : 0;
        const puntiAway = formaAway ? formaAway.split(' ').filter(c => c === 'W').length * 3 + formaAway.split(' ').filter(c => c === 'D').length * 1 : 0;
        const percPuntiHome = formaHome ? Math.round((puntiHome / 15) * 100) : 0;
        const percPuntiAway = formaAway ? Math.round((puntiAway / 15) * 100) : 0;

        const trendHome = percPuntiHome >= 80 ? '📈 In crescita' : percPuntiHome >= 50 ? '📊 Stabile' : '📉 In calo';
        const trendAway = percPuntiAway >= 80 ? '📈 In crescita' : percPuntiAway >= 50 ? '📊 Stabile' : '📉 In calo';

        return {
            homeStats, awayStats,
            homeMediaFatti, homeMediaSubiti, homeMediaTotali,
            awayMediaFatti, awayMediaSubiti, awayMediaTotali,
            percPuntiHome, percPuntiAway,
            trendHome, trendAway,
            formaHome, formaAway
        };
    }

    function generateFallbackReport(match, stats) {

        const multigolTotali = [
            { nome: 'Over 1.5', valore: over15 },
            { nome: '1-4', valore: Math.round((homeMulti.p02 + awayMulti.p02 + homeMulti.p13 + awayMulti.p13) / 4) },
            { nome: '2-5', valore: Math.round((homeMulti.p13 + awayMulti.p13 + homeMulti.p25 + awayMulti.p25) / 4) }
        ];
        
        let bestCombo = { nome: '12+Under4.5', valore: giocata1 };
        doppieChance.forEach(dc => {
            multigolTotali.forEach(mg => {
                const comboVal = Math.round((dc.valore + mg.valore) / 2);
                if (comboVal > bestCombo.valore) {
                    bestCombo = { nome: dc.nome + ' + ' + mg.nome, valore: comboVal };
                }
            });
        });

        const homeWin = Math.min(100, Math.max(5, Math.round((parseInt(homeStats.punti) || 0) * 3.5 + (parseInt(homeStats.diff) || 0) * 1.2)));
        const awayWin = Math.min(100, Math.max(5, Math.round((parseInt(awayStats.punti) || 0) * 3.5 + (parseInt(awayStats.diff) || 0) * 1.2)));
        let draw = Math.max(5, 100 - homeWin - awayWin);
        if (draw < 5) draw = 5;
        const sum = homeWin + awayWin + draw;
        const homeP = Math.round((homeWin / sum) * 100);
        const awayP = Math.round((awayWin / sum) * 100);
        const drawP = Math.round((draw / sum) * 100);
        
        let pronostico = 'X';
        let pronPerc = drawP;
        if (homeP > awayP && homeP > drawP) { pronostico = '1'; pronPerc = homeP; }
        else if (awayP > homeP && awayP > drawP) { pronostico = '2'; pronPerc = awayP; }

        const sicurezza = Math.min(100, Math.round(pronPerc + 10));

        // Genera i quadratini colorati per lo stato forma nel report
        function getFormaBoxes(forma) {
            if (!forma || forma === '') {
                return '⬜⬜⬜⬜⬜';
            }
            return forma.split(' ').map(c => {
                if (c === 'W') return '🟩';
                if (c === 'D') return '🟨';
                if (c === 'L') return '🟥';
                return '⬜';
            }).join('');
        }

        const homeFormaEmoji = getFormaBoxes(homeStats.forma);
        const awayFormaEmoji = getFormaBoxes(awayStats.forma);

        return `
## 📊 STATO DI FORMA

**${match.casa}**: ${homeFormaEmoji} ${homeStats.forma || 'N/D'} | Punti ultimi 5: ${percPuntiHome}% | ${trendHome}
**${match.ospite}**: ${awayFormaEmoji} ${awayStats.forma || 'N/D'} | Punti ultimi 5: ${percPuntiAway}% | ${trendAway}

---

## 📊 MEDIA GOL

| Squadra | Gol Fatti | Gol Subiti | Totale | xG |
|---------|-----------|------------|--------|-----|
| ${match.casa} | ${homeMediaFatti} | ${homeMediaSubiti} | ${homeMediaTotali} | ${homeStats.xg || 'N/D'} |
| ${match.ospite} | ${awayMediaFatti} | ${awayMediaSubiti} | ${awayMediaTotali} | ${awayStats.xg || 'N/D'} |

---

## 📊 RANGE GOL PIÙ FREQUENTE

**${match.casa}**: 0-2: ${homeMulti.p02}% | 1-3: ${homeMulti.p13}% | Over 1.5: ${Math.round((homeMulti.p13 + homeMulti.p25) / 2)}%
**${match.ospite}**: 0-2: ${awayMulti.p02}% | 1-3: ${awayMulti.p13}% | Over 1.5: ${Math.round((awayMulti.p13 + awayMulti.p25) / 2)}%

---

## 📊 MULTIGOL CASA/OSPITE

| Squadra | 0-2 | 1-3 | 2-5 |
|---------|-----|-----|-----|
| ${match.casa} | ${homeMulti.p02}% | ${homeMulti.p13}% | ${homeMulti.p25}% |
| ${match.ospite} | ${awayMulti.p02}% | ${awayMulti.p13}% | ${awayMulti.p25}% |

---

## 📊 UNDER/OVER

- Over 1.5: ${over15}%
- Over 2.5: ${over25}%
- Under 3.5: ${under35}%
- Under 4.5: ${under45}%

---

## 📈 DETTAGLIO 3 GIOCATE

**GIOCATA 1 (12+U4.5)**: ${giocata1}%
- Formula: (Vittorie Casa ${vittorieCasa} + Vittorie Ospite ${vittorieOspite}) / Partite Totali ${totalePartite} * 100 + Under 4.5 ${under45}% / 2

**GIOCATA 2 (COMBINATA)**: ${giocata2}%
- Multigol 1-3 Casa: ${multiCasa13}% | Multigol 1-3 Ospite: ${multiOspite13}%
- Media: (${multiCasa13} + ${multiOspite13}) / 2 = ${giocata2}%

**GIOCATA 3 (LIBERA)**: ${bestCombo.nome} = ${bestCombo.valore}%

---

## 💰 CONSIGLI DI TRADING

| # | Giocata | Percentuale |
|---|---------|-------------|

| 2 | Multigol 1-3 Media | ${giocata2}% |

**🎯 PRONOSTICO 1X2**: ${pronostico} (${pronPerc}%)
**🎯 SICUREZZA**: ${sicurezza}% ${sicurezza >= 60 ? '✅ Alta' : sicurezza >= 40 ? '⚠️ Media' : '❌ Bassa'}

## 📊 VALUTAZIONE FINALE

- **Indice Rischio**: ${sicurezza >= 70 ? '🟢 Basso' : sicurezza >= 50 ? '🟡 Medio' : '🔴 Alto'}
- **Affidabilità**: ${sicurezza >= 70 ? '✅ Alta' : sicurezza >= 50 ? '⚠️ Media' : '❌ Bassa'}

    }

    function formatReportToHtml(text) {
        if (!text) return '';
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br>')
            .replace(/## (.*?)(<br>|$)/g, '<br><strong style="font-size:1.1rem;color:var(--text-primary);">📌 $1</strong><br>')
            .replace(/### (.*?)(<br>|$)/g, '<br><strong style="font-size:0.95rem;color:var(--text-secondary);">$1</strong><br>')
            .replace(/---/g, '<hr style="border-color:var(--card-border);margin:8px 0;">')
            .replace(/\|/g, ' | ')
            .replace(/🟩/g, '<span style="display:inline-block;width:18px;height:18px;background:#22c55e;border-radius:4px;margin:0 1px;"></span>')
            .replace(/🟨/g, '<span style="display:inline-block;width:18px;height:18px;background:#eab308;border-radius:4px;margin:0 1px;"></span>')
            .replace(/🟥/g, '<span style="display:inline-block;width:18px;height:18px;background:#ef4444;border-radius:4px;margin:0 1px;"></span>')
            .replace(/⬜/g, '<span style="display:inline-block;width:18px;height:18px;background:#6b7280;border-radius:4px;margin:0 1px;"></span>');
    }

    // ================================================================
    // TEST CONNESSIONE GROQ
    // ================================================================

    async function testGroqConnection() {
        const groqKey = document.getElementById('groqKey').value.trim() || localStorage.getItem('groqApiKey') || '';
        const groqModel = document.getElementById('groqModel').value || localStorage.getItem('groqModel') || 'llama-3.1-8b-instant';
        const btn = document.getElementById('testGroqBtn');
        
        if (!groqKey) {
            btn.innerHTML = '❌ Inserisci una API Key!';
            btn.style.background = '#ef4444';
            btn.style.color = '#fff';
            setTimeout(() => {
                btn.innerHTML = '🔍 Test Connessione GROQ';
                btn.style.background = '#f59e0b';
                btn.style.color = '#000';
            }, 3000);
            return;
        }
        
        btn.innerHTML = '⏳ Test in corso...';
        btn.disabled = true;
        btn.style.background = '#f59e0b';
        
        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${groqKey}`
                },
                body: JSON.stringify({
                    model: groqModel,
                    messages: [{ role: 'user', content: 'Rispondi con "OK" se funziona.' }],
                    temperature: 0.3,
                    max_tokens: 10
                })
            });
            
            const data = await response.json();
            
            if (response.status === 200 && data.choices && data.choices[0]) {
                btn.innerHTML = '✅ GROQ FUNZIONA!';
                btn.style.background = '#22c55e';
                btn.style.color = '#fff';
                localStorage.setItem('groqApiKey', groqKey);
                localStorage.setItem('groqModel', groqModel);
                setTimeout(() => {
                    btn.innerHTML = '🔍 Test Connessione GROQ';
                    btn.style.background = '#f59e0b';
                    btn.style.color = '#000';
                    btn.disabled = false;
                }, 3000);
                return true;
            } else {
                let errorMsg = data.error?.message || 'Errore sconosciuto';
                if (response.status === 401) errorMsg = '❌ CHIAVE NON VALIDA!';
                else if (response.status === 429) errorMsg = '❌ TROPPE RICHIESTE! Attendere.';
                else if (response.status === 404) errorMsg = '❌ MODELLO NON TROVATO!';
                btn.innerHTML = errorMsg;
                btn.style.background = '#ef4444';
                btn.style.color = '#fff';
                setTimeout(() => {
                    btn.innerHTML = '🔍 Test Connessione GROQ';
                    btn.style.background = '#f59e0b';
                    btn.style.color = '#000';
                    btn.disabled = false;
                }, 4000);
                return false;
            }
        } catch (error) {
            btn.innerHTML = '❌ ERRORE: ' + error.message;
            btn.style.background = '#ef4444';
            btn.style.color = '#fff';
            setTimeout(() => {
                btn.innerHTML = '🔍 Test Connessione GROQ';
                btn.style.background = '#f59e0b';
                btn.style.color = '#000';
                btn.disabled = false;
            }, 4000);
            return false;
        }
    }

    function getWeatherIcon(code) {
        const icons = {
            '113': '☀️', '116': '⛅', '119': '☁️', '122': '☁️',
            '143': '🌫️', '176': '🌦️', '179': '🌨️', '182': '🌧️',
            '185': '🌧️', '200': '⛈️', '227': '❄️', '230': '❄️',
            '248': '🌫️', '260': '🌫️', '263': '🌦️', '266': '🌧️',
            '281': '🌧️', '284': '🌧️', '293': '🌧️', '296': '🌧️',
            '299': '🌧️', '302': '🌧️', '305': '🌧️', '308': '🌧️',

    // ================================================================
    // TAB MANAGEMENT
    // ================================================================

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tab);
        });
        document.querySelectorAll('.tab-content').forEach(el => {
            el.classList.toggle('active', el.id === `tab-${tab}`);
        });
    }

    // ================================================================
    // SWIPE
    // ================================================================

    let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;

    document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        touchEndY = e.changedTouches[0].screenY;
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 30) {
            const tabs = ['palinsesto', 'analisi', 'impostazioni'];
            const currentIdx = tabs.indexOf(currentTab);
            if (diffX < 0 && currentIdx < tabs.length - 1) {
                switchTab(tabs[currentIdx + 1]);
                if (tabs[currentIdx + 1] === 'analisi' && matches.length > 0) {
                    renderAnalisiAI(currentMatchIndex);
                }
            } else if (diffX > 0 && currentIdx > 0) {
                switchTab(tabs[currentIdx - 1]);
            }
        } else if (currentTab === 'palinsesto' && Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 30) {
            const filtered = getFilteredMatches();
            if (diffY < 0 && currentMatchIndex < filtered.length - 1) {
                currentMatchIndex++;
                scrollToCard(currentMatchIndex);
            } else if (diffY > 0 && currentMatchIndex > 0) {
                currentMatchIndex--;
                scrollToCard(currentMatchIndex);
            }
        }
    }, { passive: true });

    function scrollToCard(index) {
        const cards = document.querySelectorAll('.card[data-tab="palinsesto"]');
        if (cards[index]) {
            cards[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
            cards.forEach((c, i) => {
                c.style.borderColor = i === index ? '#3b82f6' : 'var(--card-border)';
                c.style.transform = i === index ? 'scale(1.02)' : 'scale(1)';
            });
            setTimeout(() => {
                cards.forEach(c => {
                    c.style.borderColor = 'var(--card-border)';
                    c.style.transform = 'scale(1)';
                });
            }, 1000);
        }
    }

    // ================================================================
    // CLOCK, TEMA, FONT SIZE
    // ================================================================

    function updateClock() {
        const now = new Date();
        document.getElementById('currentDate').textContent = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        document.getElementById('currentTime').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    let currentTheme = localStorage.getItem('theme') || 'dark';

    function applyTheme(theme) {
        document.body.classList.toggle('light', theme === 'light');
        currentTheme = theme;
        localStorage.setItem('theme', theme);
        document.getElementById('themeDark').className = theme === 'dark' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('themeLight').className = theme === 'light' ? 'tab-btn active' : 'tab-btn';
    }

    // ================================================================
    // FONT SIZE
    // ================================================================

    const fontClasses = ['font-sm', 'font-md', 'font-lg', 'font-xl'];
    const fontLabels = ['Piccolo (13px)', 'Medio (16px)', 'Grande (19px)', 'Extra Grande (22px)'];

    function applyFontSize(level) {
        document.body.classList.remove(...fontClasses);
        if (level >= 1 && level <= 4) {
            document.body.classList.add(fontClasses[level - 1]);
        }
        document.getElementById('fontSizeDisplay').textContent = fontLabels[level - 1] || 'Medio (16px)';
        document.getElementById('fontSizeSlider').value = level;
        localStorage.setItem('fontSize', level);
    }

    // ================================================================
    // IMPOSTAZIONI
    // ================================================================

    document.getElementById('themeDark').addEventListener('click', () => applyTheme('dark'));
    document.getElementById('themeLight').addEventListener('click', () => applyTheme('light'));

    document.getElementById('fontSizeSlider').addEventListener('input', function() {
        const level = parseInt(this.value);
        applyFontSize(level);
    });

    // Test GROQ
    document.getElementById('testGroqBtn').addEventListener('click', testGroqConnection);

    document.getElementById('saveSettings').addEventListener('click', () => {
        const groq = document.getElementById('groqKey').value.trim();
        const model = document.getElementById('groqModel').value;
        const weather = document.getElementById('weatherKey').value.trim();
        if (groq) localStorage.setItem('groqApiKey', groq);
        localStorage.setItem('groqModel', model);
        if (weather) localStorage.setItem('weatherApiKey', weather);
        alert('✅ Impostazioni salvate!');
        if (currentTab === 'analisi' && matches.length > 0) {
            renderAnalisiAI(currentMatchIndex, true);
        }
    });

    // Carica impostazioni
    document.getElementById('groqKey').value = localStorage.getItem('groqApiKey') || '';
    document.getElementById('groqModel').value = localStorage.getItem('groqModel') || 'llama-3.1-8b-instant';
    document.getElementById('weatherKey').value = localStorage.getItem('weatherApiKey') || 'd8df501134ef44eab6515526262007';

    // ================================================================
    // SIMULA TELEFONO
    // ================================================================

    document.getElementById('simulateBtn').addEventListener('click', openPhoneSimulator);

    // ================================================================
    // FILTRO
    // ================================================================

    document.getElementById('campFilter').addEventListener('change', function() {
        currentFilter = this.value;
        renderCards();
        document.querySelector('.grid-cards').scrollTop = 0;
    });

    // ================================================================
    // TAB BUTTONS
    // ================================================================

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const tab = this.dataset.tab;
            switchTab(tab);
            if (tab === 'analisi' && matches.length > 0) {
                renderAnalisiAI(currentMatchIndex);
            }
        });
    });

    // ================================================================
    // HOME BUTTON
    // ================================================================

    document.getElementById('homeBtn').addEventListener('click', () => {
        currentMatchIndex = 0;
        switchTab('palinsesto');
        if (matches.length > 0) {
            setTimeout(() => scrollToCard(0), 300);
        }
    });

    // ================================================================
    // AVVIO
    // ================================================================

    filterMatchesByDate();

    const savedFontSize = parseInt(localStorage.getItem('fontSize')) || 2;
    applyFontSize(savedFontSize);

    applyTheme(currentTheme);
    updateClock();
    populateFilter();
    renderCards();
    setInterval(updateClock, 1000);
    setInterval(() => {
        filterMatchesByDate();
        populateFilter();
        renderCards();
    }, 60000);

    if (matches.length > 0 && currentTab === 'analisi') {
        renderAnalisiAI(0);
    }
</script>
</body>
</html>
